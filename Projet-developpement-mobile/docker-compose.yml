services:
  db:
    image: mysql:8.4
    container_name: fittrack-mysql1
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fittrack_db}
      MYSQL_USER: ${MYSQL_USER:-fittrack}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fittrack123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fittrack-backend1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: ${BACKEND_PORT:-8082}
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-fittrack_db}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-fittrack}
      DB_PASSWORD: ${MYSQL_PASSWORD:-fittrack123}
      FLYWAY_CONNECT_RETRIES: ${FLYWAY_CONNECT_RETRIES:-30}

      MAIL_HOST: ${MAIL_HOST:-smtp.ethereal.email}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_STARTTLS_ENABLE: ${MAIL_STARTTLS_ENABLE:-true}
      MAIL_FAIL_ON_ERROR: ${MAIL_FAIL_ON_ERROR:-true}

      OTP_RETURN_CODE_IN_RESPONSE: ${OTP_RETURN_CODE_IN_RESPONSE:-false}
      PASSWORD_RESET_RETURN_LINK_IN_RESPONSE: ${PASSWORD_RESET_RETURN_LINK_IN_RESPONSE:-false}
      PASSWORD_RESET_URL_TEMPLATE: ${PASSWORD_RESET_URL_TEMPLATE:-fittrack://reset-password?otpId={otpId}&code={code}}
    ports:
      - "${BACKEND_PORT:-8082}:${BACKEND_PORT:-8082}"

  frontend:
    build:
      context: ./fittrack-mobile1
      dockerfile: Dockerfile
    container_name: fittrack-mobile-web1
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      EXPO_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8082}
      EXPO_PUBLIC_API_PORT: ${BACKEND_PORT:-8082}
      CI: "1"
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-19006}:19006"
    volumes:
      - ./fittrack-mobile1:/app
      - /app/node_modules
    command: ["npx", "expo", "start", "--web", "--host", "lan", "--port", "19006"]

volumes:
  mysql_data: